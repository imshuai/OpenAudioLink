name: windows

on:
  pull_request:
  push:
    branches: [main, 'phase-*']

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet test receiver-windows/OpenAudioLink.sln -c Release
