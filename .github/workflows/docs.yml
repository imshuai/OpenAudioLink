name: docs

on:
  pull_request:
  push:
    branches: [main, 'phase-*']

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 tools/check_docs_consistency.py
      - run: python3 tools/protocol/generate_golden_packets.py --check
